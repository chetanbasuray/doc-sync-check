name: Semantic Release

on:
  push:
    branches:
      - main

permissions:
  contents: write       # allow semantic-release to push tags
  issues: write         # allow @semantic-release/github to open failure issues
  pull-requests: write  # allow status updates/comments if needed

jobs:
  release:
    name: Publish to NPM
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    
    # We shouldn't release if CI hasn't passed, though push triggers run in parallel so 
    # github protects main anyway. But to be safe in a strict pipeline:
    # needs: [ci] 
    # (assuming ci and release are in the same workflow, but since they are separate,
    # rely on branch protection rules, OR run CI verification beforehand)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        
      - name: Force Build before Publish
        run: npm run build

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
